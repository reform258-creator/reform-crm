    const h=H0+Math.floor(m/60),min=m%60;
    const isHour=min===0;
    const lbl=isHour
      ?`<span class="tg-h">${p(h)}:00</span>`
      :(calZoom<=15?`<span class="tg-sub">:${p(min)}</span>`:`<span class="tg-sub">:${p(min)}</span>`);
    gut+=`<div class="tg-row" style="height:${slotH}px">${lbl}</div>`;
  }
  document.getElementById('tgutter').innerHTML=gut;
  const days=calView==='week'?Array.from({length:7},(_,i)=>addD(ws,i)):[curDate];
  const G=2; // gap px
  let grid='';
  days.forEach(day=>{
    const isTd=sameD(day,td),H=(H1-H0)*PX;
    const vm=visMasters();
    // all appts for this day visible masters
    const dayA=APPTS.filter(a=>sameD(a.start,day)&&(mFilter==='all'||a.master.id===mFilter));
    const lay=layout(dayA);
    let lines='';
    const totalMins=(H1-H0)*60;
    for(let m=0;m<totalMins;m+=calZoom){
      const top=m/60*PX;
      const isHour=m%60===0;
      lines+=`<div class="${isHour?'hour-line':'slot-line'}" style="top:${top}px"></div>`;
    }
    const cards=lay.map(({a,col,total})=>{
      const top=ty(a.start),ht=dpx(a.start,a.end),compact=ht<42;
      const unpaid=!a.isPaid&&['booked','confirmed','arrived'].includes(a.status);
      const pct=100/total,L=col*pct,W=pct;
      const style=total>1?`left:calc(${L}% + ${G}px);width:calc(${W}% - ${G*2}px);`:'left:3px;right:3px;';
      const mCls=mFilter==='all'?` m${a.master.id.replace('m','')}-tint`:'';
      const tipId=a.id;
      return `<div class="appt ${a.status}${mCls}" style="top:${top}px;height:${ht}px;${style}"
        draggable="true"
        ondragstart="dStart(event,'${a.id}')"
        onmouseenter="showTip(event,'${a.id}')"
        onmouseleave="hideTip()"
        onclick="openAppt('${a.id}')">
        ${unpaid?'<div class="unpaid-dot"></div>':''}
        <div class="appt-body">
          <div class="a-name">${a.client.name.split(' ')[0]} ${(a.client.name.split(' ')[1]||'')[0]||''}.${isBday(a.client)?' 🎂':''}</div>

          ${!compact?`<div class="a-svc">${a.service.name}</div>`:''}
          ${ht>=70?`<div class="a-meta">${p(a.start.getHours())}:${p(a.start.getMinutes())} · ${a.service.dur}хв</div>`:''}
        </div>
        ${ht>=55?`<div class="a-tags">${a.sub?'<span class="atag atag-sub">🎟 АБ</span>':''}${a.isPaid?'<span class="atag atag-paid">✓</span>':''}</div>`:''}
      </div>`;
    }).join('');
    grid+=`<div class="day-col">
      <div class="day-hd${isTd?' tod-hd':''}">
        <span class="dwd">${UK_DS[day.getDay()]}</span>
        <span class="dnum${isTd?' tod':''}">${day.getDate()}</span>
      </div>
      <div class="day-inner" id="dayInner_${day.getTime()}" style="height:${H}px;position:relative"
        onclick="cellClick(event,${day.getTime()})"
        ondragover="dOver(event)"
        ondrop="dDrop(event,${day.getTime()})"
        ondragleave="dLeave(event)">
        ${lines}${cards}
        ${isTd?'<div class="now-line" id="nowLine"></div>':''}
      </div>
    </div>`;
  });
  document.getElementById('calGrid').innerHTML=grid;
  renderMiniCal();
  setTimeout(updateNowLine,0);
  updateKasa();
}

function cellClick(e,dayMs){
  if(e.target.closest('.appt'))return;
  const rect=e.currentTarget.getBoundingClientRect();
  const relY=e.clientY-rect.top;
  const totalMins=Math.round((relY/PX*60)/calZoom)*calZoom;
  const clickH=H0+Math.floor(totalMins/60),clickM=totalMins%60;
  const d=new Date(dayMs);
  np={clientId:null,services:{},masterId:visMasters()[0]||'m1',
    start:`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(clickH)}:${p(clickM)}`,
    billDisc:0,billDiscType:'%',tab:'details'};
  renderModal();
}

function dStart(e,id){
  dragId=id;dragOffY=e.offsetY;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>document.querySelectorAll(`.appt`).forEach(el=>{if(el.getAttribute('ondragstart')?.includes(id))el.classList.add('dragging');}),0);
}
function dOver(e){e.preventDefault();e.currentTarget.classList.add('drop-hi');}
function dLeave(e){e.currentTarget.classList.remove('drop-hi');}
function dDrop(e,dayMs){
  e.preventDefault();e.currentTarget.classList.remove('drop-hi');
  const a=APPTS.find(x=>x.id===dragId);if(!a)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const relY=e.clientY-rect.top-dragOffY;
  const mins=Math.round((relY/PX)*60/calZoom)*calZoom;
  const total=H0*60+Math.max(0,Math.min(mins,(H1-H0)*60));
  const ns=new Date(dayMs);ns.setHours(Math.floor(total/60),total%60,0,0);
  a.start=ns;a.end=new Date(ns.getTime()+(a.end-a.start+0));
  const dur=a.service.dur*60000;
  a.end=new Date(ns.getTime()+dur);
  sbUpdateAppt(a.id,{start_time:ns.toISOString(),end_time:a.end.toISOString()});
  dragId=null;renderCal();showToast('Запис перенесено ✓');
}

function confirmPM(){
  const a=pm.appt;if(!a)return;
  a.isPaid=true;a.status='arrived';
  if(pm.useSub){
    // Close via subscription — client pays 0, record effective price for salary
    const sub=getSub(a.client.id);
    if(sub){
      const pricePerSession=Math.round(sub.pricePaid/sub.total);
      a.subPrice=pricePerSession; // effective price for salary calculation
      sub.used++;
      if(sub.used>=sub.total)sub.status='done';
      a.sub=getSub(a.client.id); // refresh remaining
    }
    a.payMethod='sub';a.price=0;
    sbUpdateAppt(a.id,{is_paid:true,status:'arrived',pay_method:'sub'});
    closePM();closePanel();renderCal();updateKasa();
    const sub2=SUBS.find(s=>s.clientId===a.client.id);
    const eff=a.subPrice?` · ${a.subPrice.toLocaleString('uk-UA')} ₴/сеанс`:'';
    lsSave();showToast('Сеанс списано з абонементу ✓'+eff);
    return;
  }
  const due=a.price-a.discount;
  a.payMethod=pm.method;
  sbUpdateAppt(a.id,{is_paid:true,status:'arrived',pay_method:pm.method});
  const kasaRow={date:new Date(),method:pm.method,amount:due};
  if(due>0){KASA.push(kasaRow);sbAddKasa(kasaRow);}
  if(pm.dep>0){
    a.client.deposit+=pm.dep;
    sbUpdateClient(a.client.id,{deposit:a.client.deposit});
    const depRow={date:new Date(),method:'deposit',amount:pm.dep};
    KASA.push(depRow);sbAddKasa(depRow);
  }
  closePM();closePanel();renderCal();updateKasa();
  showToast('Оплату закрито ✓');
}

  Object.entries(np.services).forEach(([sid,v])=>{

    let pr=svc.price*(1-(v.disc||0)/100);

function saveAppt(pay){
  const svcs=Object.entries(np.services).filter(([,v])=>v.on).map(([id,v])=>({svc:SERVICES.find(s=>s.id===id),v})).filter(x=>x.svc);
  if(!np.clientId||!svcs.length){showToast('Оберіть клієнта та послугу');return;}
  const client=CLIENTS.find(c=>c.id===np.clientId);
  const master=MASTERS.find(m=>m.id===np.masterId)||MASTERS[0];
  const startDt=new Date(np.start||new Date());
  const totalDur=svcs.reduce((s,{svc})=>s+svc.dur,0);
  const endDt=new Date(startDt.getTime()+totalDur*60000);
  let totalPrice=0,totalDiscount=0;
  svcs.forEach(({svc,v})=>{
    const pr=Math.round(svc.price*(1-(v.disc||0)/100));
    const bd=np.billDiscType==='%'?pr*np.billDisc/100:Math.min(pr,np.billDisc/svcs.length);
    const final=v.sub?0:Math.round(pr-bd);
    totalPrice+=svc.price;
    totalDiscount+=(svc.price-final);
  });
  const svcName=svcs.map(({svc})=>svc.name).join(' + ');
  const combinedSvc={id:svcs.length===1?svcs[0].svc.id:'combo',name:svcName,dur:totalDur,price:totalPrice};

  if(np.editId){
    // UPDATE existing appointment
    const a=APPTS.find(x=>x.id===np.editId);
    if(a){
      a.client=client;a.master=master;
      a.service=combinedSvc;
      a.services=svcs.map(({svc,v})=>({...svc,disc:v.disc||0,subUsed:!!v.sub}));
      a.start=startDt;a.end=endDt;
      a.price=totalPrice;a.discount=totalDiscount;
      sbUpdateAppt(a.id,{client_id:client.id,master_id:master.id,service_id:combinedSvc.id,
        start_time:startDt.toISOString(),end_time:endDt.toISOString(),
        price:totalPrice,discount:totalDiscount});
      activeAppt=a;
    }
    closeModal();renderCal();renderSP();
    showToast('Запис оновлено ✓');
    return;
  }

  const a={id:'a'+Date.now(),client,master,
    service:combinedSvc,
    services:svcs.map(({svc,v})=>({...svc,disc:v.disc||0,subUsed:!!v.sub})),
    start:startDt,end:endDt,
    status:'booked',price:totalPrice,discount:totalDiscount,
    isPaid:false,payMethod:null,sub:null};
  APPTS.push(a);sbSaveAppt(a);
  closeModal();renderCal();
  if(pay)openPM(a);
  else showToast('Запис збережено ✓');
}

  if(e.key==='Escape'){
    if(document.getElementById('ccWrap'))closeCC();
    else if(document.getElementById('pmWrap'))closePM();
    else if(document.getElementById('moWrap'))closeModal();
    else{closePal();closePanel();}
  }
});


// ── SUPABASE HELPERS ──────────────────────────────────────────────
function apptToRow(a){
  return {
    id: a.id,
    client_id: a.client.id,
    master_id: a.master.id,
    service_id: a.service.id,
    start_time: a.start.toISOString(),
    end_time: a.end.toISOString(),
    status: a.status,
    price: a.price,
    discount: a.discount||0,
    is_paid: a.isPaid,
    pay_method: a.payMethod||null
  };
}
function rowToAppt(r){
  const client=CLIENTS.find(c=>c.id===r.client_id);
  const master=MASTERS.find(m=>m.id===r.master_id);
  const service=SERVICES.find(s=>s.id===r.service_id);
  return {
    id:r.id, client, master, service,
    start:new Date(r.start_time), end:new Date(r.end_time),
    status:r.status, price:r.price, discount:r.discount||0,
    isPaid:r.is_paid, payMethod:r.pay_method||null, sub:null
  };
}
function rowToClient(r){
  return {id:r.id,name:r.name,phone:r.phone||'',deposit:r.deposit||0,birthday:r.birthday||'',tags:r.tags||[],notes:r.notes||''};
}
function rowToSub(r){
  return {id:r.id,clientId:r.client_id,serviceId:r.service_id,total:r.total,used:r.used,pricePaid:r.price_paid,expires:r.expires,status:r.status};
}
async function sbSaveAppt(a){
  if(!sb)return;
  const row=apptToRow(a);
  await sb.from('appointments').upsert(row);
}
async function sbUpdateAppt(id, fields){
  if(!sb)return;
  await sb.from('appointments').update(fields).eq('id',id);
}
async function sbDeleteAppt(id){
  if(!sb)return;
  await sb.from('appointments').delete().eq('id',id);
}
async function sbSaveClient(c){
  if(!sb)return;
  await sb.from('clients').upsert({id:c.id,name:c.name,phone:c.phone,deposit:c.deposit,birthday:c.birthday,tags:c.tags,notes:c.notes});
}
async function sbUpdateClient(id, fields){
  if(!sb)return;
  await sb.from('clients').update(fields).eq('id',id);
}
async function sbAddKasa(row){
  if(!sb)return;
  await sb.from('kasa').insert({date:row.date.toISOString(),method:row.method,amount:row.amount});
}

async function loadFromSupabase(){
  if(!sb){APPTS=makeAppts();return;}
  showToast('Завантаження…');
  try {
    const [{data:clients},{data:appts},{data:subs},{data:kasa}] = await Promise.all([
      sb.from('clients').select('*'),
      sb.from('appointments').select('*').gte('start_time', new Date(Date.now()-30*24*3600000).toISOString()),
      sb.from('subscriptions').select('*'),
      sb.from('kasa').select('*').gte('date', new Date().toISOString().split('T')[0])
    ]);
    if(clients) CLIENTS.length=0, clients.forEach(r=>CLIENTS.push(rowToClient(r)));
    if(subs) SUBS.length=0, subs.forEach(r=>SUBS.push(rowToSub(r)));
    if(appts){
      APPTS=appts.map(rowToAppt).filter(a=>a.client&&a.master&&a.service);
      APPTS.forEach(a=>{a.sub=getSub(a.client.id,a.service.id);});
    }
    if(kasa){
      KASA.length=0;
      kasa.forEach(r=>KASA.push({date:new Date(r.date),method:r.method,amount:r.amount}));
    }
    showToast('Дані завантажено ✓');
  } catch(e){
    console.error('Supabase error:',e);
    showToast('Помилка з\'єднання — режим демо');
    APPTS=makeAppts();
  }
}

// ── INIT ──────────────────────────────────────────────────────────

function updateNowLine(){
  const nl=document.getElementById('nowLine');
  if(!nl)return;
  const now=new Date();
  const top=((now.getHours()-H0)*60+now.getMinutes())/60*PX;
  nl.style.top=top+'px';
}
async function init(){
  lsLoad();
  renderNav();renderMasterPills();renderZoomBar();
  await loadFromSupabase();
  renderCal();
  setTimeout(()=>{
    const cb=document.querySelector('.cal-body');
    if(!cb)return;
    const now=new Date();
    const mins=(now.getHours()-H0)*60+now.getMinutes();
    const scrollTo=Math.max(0,(mins/60*PX)-120);
    cb.scrollTop=scrollTo;
    updateNowLine();
  },100);
  setInterval(()=>{updateNowLine();},60000);
}
init();








// ── NEW APPOINTMENT FORM (Bookon-style) ──────────────────────────
const BREAK_MIN = 10;
// _qa.services = [{svcId, masterId}]
let _qa = { services:[], clientId:null, date:'', time:'10:00' };
let _qaSvcPickerOpen = false;

function openDrawer(dateStr, timeStr){
  const now = new Date();
  _qa = {
    services:[], clientId:null,
    date: dateStr||`${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}`,
    time: timeStr||`${p(now.getHours())}:00`
  };
  _qaSvcPickerOpen = false;
  _renderQA();
}

function closeQA(){ document.getElementById('qaOverlay')?.remove(); }

function _qaCalcTotal(){
  return _qa.services.reduce((s,row)=>{
    const svc=SERVICES.find(x=>x.id===row.svcId);
    return s+(svc?svc.price:0);
  },0);
}
function _qaCalcDur(){
  return _qa.services.reduce((s,row)=>{
    const svc=SERVICES.find(x=>x.id===row.svcId);
    return s+(svc?svc.dur:0);
  },0);
}

function _renderQA(){
  document.getElementById('qaOverlay')?.remove();
  const ov = document.createElement('div');
  ov.id = 'qaOverlay';
  ov.className = 'qa-overlay';

  const client = CLIENTS.find(c=>c.id===_qa.clientId);
  const total = _qaCalcTotal();
  const totalDur = _qaCalcDur();

  // service rows
  const svcRows = _qa.services.map((row,idx)=>{
    const svc = SERVICES.find(s=>s.id===row.svcId)||{name:'—',dur:0,price:0};
    const master = MASTERS.find(m=>m.id===row.masterId)||MASTERS[0];
    const durH = Math.floor(svc.dur/60);
    const durM = svc.dur%60;
    const durStr = durH>0?`${durH} год. ${durM>0?durM+' хв.':''}`:svc.dur+' хв.';
    return `<tr class="qa-svc-row">
      <td>
        <div class="qa-svc-td-name">${svc.name}</div>
      </td>
      <td class="qa-svc-td-master">
        <div class="av" style="background:${master.color};width:28px;height:28px;font-size:10px;margin:0 auto">${master.name[0]}</div>
      </td>
      <td class="qa-svc-td-dur">${durStr}</td>
      <td class="qa-svc-td-price">${svc.price.toLocaleString('uk-UA')}</td>
      <td><button class="qa-row-del" data-action="del-svc" data-idx="${idx}" title="Видалити">✕</button></td>
    </tr>`;
  }).join('');

  // service picker dropdown (inline)
  const pickerHTML = _qaSvcPickerOpen ? `
    <div class="qa-svc-picker">
      ${SERVICES.map(s=>`
        <div class="qa-svc-pick-item" data-action="add-svc" data-id="${s.id}">
          <span>${s.name}</span>
          <span style="color:var(--ink3);font-size:11px">${s.dur} хв · ${s.price.toLocaleString('uk-UA')} ₴</span>
        </div>`).join('')}
    </div>` : '';

  const clientHTML = client
    ? `<div class="qa-client-sel">
        <div class="av" style="background:var(--accent);width:28px;height:28px;font-size:11px">${client.name[0]}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${client.name}</div>
          <div style="font-size:11.5px;color:var(--ink3)">${client.phone}</div>
        </div>
        <button data-action="clear-client" style="border:none;background:none;cursor:pointer;color:var(--ink3);font-size:12px">Змінити</button>
      </div>`
    : `<div class="csearch" style="position:relative">
        <div class="csinput">
          <svg width="13" height="13" fill="none" stroke="var(--ink3)" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="qaClientIn" placeholder="Пошук клієнта…" autocomplete="off"/>
        </div>
        <div class="csdrop" id="qaDrop" style="display:none"></div>
      </div>`;

  const durH2 = Math.floor(totalDur/60), durM2 = totalDur%60;
  const durLabel = totalDur===0?'0 хв':(durH2>0?`${durH2} год. ${durM2>0?durM2+' хв.':''}`:durM2+' хв.');

  ov.innerHTML = `
    <div class="qa-modal qa-modal-lg" id="qaModal">
      <div class="qa-hd">
        <span class="qa-title">Новий запис</span>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="date" id="qaDate" class="qa-input qa-input-sm" value="${_qa.date}"/>
          <input type="time" id="qaTime" class="qa-input qa-input-sm" value="${_qa.time}"/>
          <button class="qa-close" data-action="close">✕</button>
        </div>
      </div>

      <div class="qa-body">
        <!-- Client -->
        <div class="qa-sect">Клієнт</div>
        ${clientHTML}

        <!-- Services table -->
        <div class="qa-sect" style="margin-top:14px">Послуги</div>
        <table class="qa-svc-table">
          <thead><tr>
            <th>Послуга</th>
            <th style="width:50px;text-align:center">Фахівець</th>
            <th style="width:90px;text-align:center">Тривалість</th>
            <th style="width:80px;text-align:right">Ціна, грн</th>
            <th style="width:28px"></th>
          </tr></thead>
          <tbody>${svcRows||'<tr><td colspan="5" style="padding:10px 0;color:var(--ink3);font-size:12.5px">Послуги не додано</td></tr>'}</tbody>
        </table>

        <!-- Add service row -->
        <div class="qa-add-row">
          <button class="qa-add-svc-btn" data-action="toggle-picker">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Додати послугу
          </button>
          ${totalDur>0?`<span class="qa-dur-label">Заг. тривалість: <strong>${durLabel}</strong></span>`:''}
        </div>
        ${pickerHTML}
      </div>

      <div class="qa-foot">
        <div style="font-size:11px;color:var(--ink3)">До сплати</div>
        <div style="font-family:'Fraunces',serif;font-size:22px;font-weight:300;color:var(--ink);letter-spacing:-0.5px">${total.toLocaleString('uk-UA')} ₴</div>
        <div style="flex:1"></div>
        <button class="qa-btn" data-action="close">Скасувати</button>
        <button class="qa-btn-pr" data-action="save" ${!_qa.clientId||!_qa.services.length?'disabled':''}>Зберегти</button>
      </div>
    </div>`;

  // event delegation
  ov.addEventListener('click', function(e){
    if(e.target===ov){closeQA();return;}
    const btn = e.target.closest('[data-action]');
    if(!btn)return;
    const act = btn.dataset.action;
    if(act==='close'){closeQA();return;}
    if(act==='toggle-picker'){_qaSvcPickerOpen=!_qaSvcPickerOpen;_renderQA();return;}
    if(act==='add-svc'){
      const masterId=MASTERS[0]?.id||'m1';
      _qa.services.push({svcId:btn.dataset.id,masterId});
      _qaSvcPickerOpen=false;
      _renderQA();return;
    }
    if(act==='del-svc'){
      _qa.services.splice(parseInt(btn.dataset.idx),1);
      _renderQA();return;
    }
    if(act==='clear-client'){_qa.clientId=null;_renderQA();return;}
    if(act==='save'){_saveQA();return;}
  });

  document.body.appendChild(ov);

  // client search
  const inp=document.getElementById('qaClientIn');
  if(inp){
    inp.focus();
    inp.addEventListener('input',function(){
      const q=this.value.trim();
      const drop=document.getElementById('qaDrop');
      if(!q){drop.style.display='none';return;}
      const res=CLIENTS.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())||c.phone.includes(q));
      drop.innerHTML=res.slice(0,6).map(c=>`<div class="csd-item" data-cid="${c.id}">${c.name}<small>${c.phone}</small></div>`).join('')
        +`<div class="csd-create" id="qaCC">+ Новий клієнт "${q}"</div>`;
      drop.style.display='block';
      drop.querySelectorAll('.csd-item').forEach(el=>{
        el.addEventListener('click',()=>{_qa.clientId=el.dataset.cid;_renderQA();});
      });
      document.getElementById('qaCC')?.addEventListener('click',openCC);
    });
  }

  // sync date/time inputs
  document.getElementById('qaDate')?.addEventListener('change',e=>_qa.date=e.target.value);
  document.getElementById('qaTime')?.addEventListener('change',e=>_qa.time=e.target.value);
}

function _saveQA(){
  if(!_qa.clientId){showToast('Оберіть клієнта');return;}
  if(!_qa.services.length){showToast('Додайте послугу');return;}
  const dateVal=document.getElementById('qaDate')?.value||_qa.date;
  const timeVal=document.getElementById('qaTime')?.value||_qa.time;
  const client=CLIENTS.find(c=>c.id===_qa.clientId);
  const primarySvc=SERVICES.find(s=>s.id===_qa.services[0].svcId)||SERVICES[0];
  const master=MASTERS.find(m=>m.id===_qa.services[0].masterId)||MASTERS[0];
  const totalDur=_qaCalcDur();
  const totalPrice=_qaCalcTotal();
  const id='a'+Date.now();
  const start=new Date(dateVal+'T'+timeVal);
  const end=new Date(start.getTime()+totalDur*60000);
  const svcName=_qa.services.map(r=>SERVICES.find(s=>s.id===r.svcId)?.name||'').filter(Boolean).join(' + ');
  const appt={
    id,clientId:_qa.clientId,client,masterId:master.id,master,
    service:{id:primarySvc.id,name:svcName,dur:totalDur,price:totalPrice},
    dur:totalDur,price:totalPrice,discount:0,
    start:start.toISOString(),end:end.toISOString(),
    status:'pending',isPaid:false,payMethod:null,
    deposit:0,notes:'',tags:[],sub:null
  };
  APPTS.push(appt);sbAddAppt(appt);
  closeQA();renderCal();
  showToast('Запис створено ✓');
}
function saveQA(){_saveQA();}


</script>
